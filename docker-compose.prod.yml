services:
  ra-frontend:
    env_file:
      - .env.prod
    build:
      context: .
      dockerfile: Dockerfile.prod
      # Join the same Docker network as runtime so build-time SSR/SSG
      # fetches can reach caramel/raapp the same way the running
      # container does. Eliminates the build/runtime URL split.
      network: ra-network
    container_name: ra-frontend
    restart: always
    volumes:
      - ./:/usr/app
    ports:
      - 8084:3000
    networks:
      - ra-network

networks:
  ra-network:
    external: true
